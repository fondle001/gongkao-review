<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>公考复习手册</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
:root {
  --bg:#f8f7f4; --card:#fff; --text:#2c2416; --text2:#8b7355;
  --border:#e8e3d8; --prime:#c0392b; --prime-l:#fef5f4; --accent:#d97706;
  --success:#059669; --radius:14px; --shadow:0 2px 12px rgba(0,0,0,.06);
  --font:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;
  --ink:#1a1a1a;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#1c1915;--card:#26211b;--text:#e8dcc8;--text2:#9b8570;
    --border:#3a3229;--prime:#e74c3c;--prime-l:#2a1a18;--shadow:0 2px 12px rgba(0,0,0,.3);
    --ink:#e8dcc8;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.65;-webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom,20px);
  -webkit-font-smoothing:antialiased;
}
/* header */
.hdr{
  position:sticky;top:0;z-index:100;background:var(--card);
  border-bottom:1px solid var(--border);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.hdr .sub{font-size:12px;color:var(--text2)}
.search-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  background:var(--bg);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* search */
.search-box{display:none;padding:8px 16px 12px;position:sticky;top:57px;z-index:99;background:var(--bg)}
.search-box.show{display:block}
.search-box input{width:100%;padding:10px 14px;border-radius:22px;border:2px solid var(--border);
  background:var(--card);font-size:15px;color:var(--text);outline:none;transition:.2s}
.search-box input:focus{border-color:var(--prime)}
/* module tabs */
.mod-tabs{display:flex;gap:10px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none}
.mod-tabs::-webkit-scrollbar{display:none}
.mod-tab{flex-shrink:0;padding:9px 22px;border-radius:22px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text2);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;user-select:none}
.mod-tab.active{background:var(--prime);color:#fff;border-color:var(--prime);box-shadow:0 2px 12px rgba(192,57,43,.25)}
/* subject tabs */
.sub-tabs{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{flex-shrink:0;padding:7px 15px;border-radius:16px;
  background:var(--prime-l);color:var(--prime);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap}
.sub-tab.active{background:var(--prime);color:#fff}
/* content */
.content{padding:10px 16px 30px}
/* lesson card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  margin-bottom:14px;overflow:hidden;border:1px solid var(--border);transition:all .2s}
.card:active{transform:scale(.995)}
.card-hd{display:flex;align-items:center;justify-content:space-between;
  padding:15px 18px;cursor:pointer;user-select:none;gap:12px}
.card-hd .badge{flex-shrink:0;width:32px;height:32px;border-radius:10px;
  background:var(--prime);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:700}
.card-hd .info{flex:1;min-width:0}
.card-hd .title{font-size:15px;font-weight:600;letter-spacing:.3px}
.card-hd .subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.card-hd .arrow{font-size:12px;color:var(--text2);transition:.25s;flex-shrink:0}
.card-hd.open .arrow{transform:rotate(180deg);color:var(--prime)}
.card-bd{display:none;padding:0 18px 18px;animation:fadeIn .25s}
.card-bd.open{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
/* section inside card */
.sec{margin-bottom:18px}
.sec:last-child{margin-bottom:0}
.sec-tt{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;letter-spacing:.5px}
/* table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl td:first-child{font-weight:600;color:var(--prime);white-space:nowrap;width:30%}
.tbl tr:last-child td{border-bottom:none}
/* formula */
.fml-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.fml-item{padding:12px 15px;background:var(--prime-l);border-radius:10px;
  font-size:14px;overflow-x:auto;border-left:3px solid var(--prime)}
/* example */
.ex{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.ex-q{padding:14px 15px;font-size:14px;background:#fffbeb;color:#92400e;line-height:1.7}
@media(prefers-color-scheme:dark){.ex-q{background:#2d1f00;color:#fbbf24}}
.ex-a{display:none;padding:12px 15px;font-size:14px;border-top:1px dashed var(--border);
  background:#f0fdf4;color:#166534;line-height:1.7}
@media(prefers-color-scheme:dark){.ex-a{background:#001a10;color:#4ade80}}
.ex-a.show{display:block;animation:fadeIn .2s}
.ex-btn{display:block;width:100%;padding:9px;text-align:center;font-size:12px;font-weight:600;
  color:var(--prime);background:none;border:none;cursor:pointer;border-top:1px solid var(--border);
  letter-spacing:.5px;transition:.15s}
.ex-btn:active{background:var(--prime-l)}
/* tip */
.tip{padding:12px 15px;border-radius:10px;background:#fef3c7;color:#92400e;font-size:13px;line-height:1.6}
@media(prefers-color-scheme:dark){.tip{background:#2d1f00;color:#fbbf24}}
/* progress */
.progress{text-align:center;padding:4px 0 20px;font-size:12px;color:var(--text2)}
/* empty */
.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty .icon{font-size:52px;margin-bottom:14px}
.empty p{font-size:15px}
/* footer */
.ft{text-align:center;padding:10px 0 40px;font-size:11px;color:var(--text2);opacity:.6}
/* search highlight */
mark{background:#fef08a;color:#000;padding:1px 3px;border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <div><h1>公考复习手册</h1><div class="sub">小P公考 · 资料分析讲义</div></div>
  <button class="search-btn" onclick="toggleSearch()" aria-label="搜索">🔍</button>
</div>
<div class="search-box" id="searchBox"><input type="text" id="searchInput" placeholder="搜索知识点、公式、例题..." oninput="doSearch()"></div>
<div class="mod-tabs" id="modTabs"></div>
<div class="sub-tabs" id="subTabs"></div>
<div class="progress" id="progress"></div>
<div class="content" id="content"></div>
<div class="ft">Made with ❤️ · 持续更新中</div>

<script>
// ==================== DATA ====================
const D=[{
  name:'行测',icon:'📊',subjects:[{
    name:'资料分析', lessons:[
{title:'第一课 · 变化', key:'现期、基期、增速、增量的概念与换算', formulas:[
  '\\Delta = B - A \\quad (\\text{现期}-\\text{基期})',
  'r = \\frac{\\Delta}{A} = \\frac{B}{A} - 1',
  'A = \\frac{B}{1+r} \\quad B = A + \\Delta = A(1+r)',
],concepts:[
  {t:'现期 (B)',d:'材料中当前时间点的数值，题干直接或间接给出的"现在"的量'},
  {t:'基期 (A)',d:'历史对比时间点的数值——大部分题目需要我们通过现期和增速/增量反推基期'},
  {t:'增速 (r)',d:'增量在基期中的占比：r = (现期-基期)/基期 × 100%。可正可负'},
  {t:'增量 (Δ)',d:'现期比基期多出的绝对值：Δ = 现期 - 基期 = 基期 × r'},
],examples:[
{q:'（江苏2015）2015年5月，我国常规天然气可采资源量40万亿立方米。与2007年评价结果相比增长82%。\n\n问：2007年我国常规天然气可采资源量是多少？\nA.22.0万亿  B.32.6万亿  C.32.8万亿  D.35.4万亿',a:'A = B/(1+r) = 40/1.82 ≈ 22.0万亿。直除：40÷1.82≈21.98，最接近A。\n\n关键：长除法时 1.82×22=40.04，验证选A。'},
{q:'2022年全国累计新发理财产品2.94万只，同比下降38.23%；累计募集资金89.62万亿元，同比减少32.57万亿元。\n\n问：基期理财产品数量约为多少万只？基期募集资金约为多少万亿元？',a:'基期数量：A = B/(1+r) = 2.94/(1-38.23%) = 2.94/0.6177 ≈ 4.76万只。\n基期募集资金：A = B + 减少额 = 89.62 + 32.57 = 122.19万亿元。\n\n注意：给了增量（减少量）时直接用加减法，不要绕路用增速公式。'},
{q:'（2020浙江）2019年全年V市交通运输、仓储和邮政业增加值398亿元，增长4.4%。\n\n问：2018年全年V市该增加值约为多少亿元？\nA.376.8  B.381.2  C.385.9  D.390.5',a:'放缩法：398/1.044 ≈ (398×0.956)/1 = 380.4。\n或化除为乘：398×(1-4.4%) = 398×0.956 ≈ 380.4。\n实际值 = 398/1.044 = 381.2。选B。\n\n💡 放缩法估算基期精度很高，此处偏差<1%，足以选出正确答案。'},
],tips:'估算三法取舍：① 增速小(<10%)→化除为乘最快 ② 增速在百化分附近→份数法 ③ 精度要求高→放缩法。原则：先粗后细，不要本末倒置追求精度。放缩法算基期时注意：分母调整比例越小越精准。'},

{title:'第二课 · 加减与误差', key:'尾数法、误差补偿、化除为乘修正', formulas:[
  '\\frac{A}{1+r} \\approx A(1-r) \\quad (|r|<10\\%)',
  '\\frac{A}{1+r} \\approx A(1-r+r^2) \\quad (\\text{更精确})',
  '\\text{份数法：增速}=a\\% \\Rightarrow A:B:\\Delta = 100:(100+a):a',
],concepts:[
  {t:'化除为乘',d:'当|r|<10%时，A/(1+r)≈A(1-r)。如398/1.044≈398×0.956。本质是泰勒展开的一阶近似'},
  {t:'误差补偿',d:'化除为乘略偏小，必要时加回r²项修正。补偿误差只是"补偿"，不需要完美控制精度'},
  {t:'份数法（百化分）',d:'将增速转换为分数：如25%→基期4份:增量1份:现期5份。快速判断各量之间倍数关系'},
  {t:'尾数法',d:'选项精度与数据精度一致时（未经过截位），通过尾数累加/累减直接锁定选项'},
],examples:[
{q:'（2020-2024年）全国规模以上工业汽车总产量数据如下：2020年2532.5万辆、2021年2652.8万辆、2022年2718.0万辆、2023年3011.3万辆、2024年3155.9万辆。\n\n问：2020-2024年全国规模以上工业汽车总产量是多少？\nA.12637.8万辆  B.13025.6万辆  C.13686.9万辆  D.14070.5万辆',a:'选项位数与数据位数相同且尾数各不相同→尾数法。\n5+8+0+3+9=25→尾数为5。选D。\n\n省了5次四位数加法，5秒出答案。'},
{q:'某省2023年GDP为5.67万亿元，同比增长3.2%。\n\n问：2022年该省GDP约为多少？',a:'化除为乘：5.67×0.968=5.49万亿元。\n精确值：5.67/1.032=5.494。偏差不到0.1%。'},
],tips:'估算精度排序：放缩≈化除为乘(修正) > 化除为乘 > 份数法。速度则反之。无最好方法，只有最合适的——关键是快速判断场景选对方法。'},

{title:'第三课 · 乘除变化', key:'乘积增长率、平均数增长率、环比增速比较', formulas:[
  'r_{AB} = r_A + r_B + r_A \\cdot r_B \\quad (C=A\\times B)',
  'r_{\\text{平均}} = \\frac{r_{\\text{分子}} - r_{\\text{分母}}}{1 + r_{\\text{分母}}}',
  '\\text{化除为乘：} r_{\\text{平均}} \\approx (r_a - r_b)(1 - r_b)',
],concepts:[
  {t:'乘积增长率',d:'当C=A×B时（如销售额=销量×单价），C的增速r = rA+rB+rA×rB。将两次变化合为一次'},
  {t:'平均数增长率',d:'平均数=分子/分母，其增速=(分子增速-分母增速)/(1+分母增速)。常考单位面积产量、人均收入等'},
  {t:'以现比代基比',d:'比较基期比值大小时：若分子增速>分母增速，则基期比<现期比；反之亦然。避免重复计算'},
  {t:'环比增速比较',d:'当月环比增速低于上年同期⇔当月同比增速低于上月同比增速。不需要真的算出环比'},
],examples:[
{q:'2021年各类镁产品出口47.72万吨，同比增长21.2%；出口单价4052.3美元/吨，同比增长65.8%。\n\n问：2021年我国各类镁产品出口总金额同比约增长多少？',a:'总金额=出口量×单价，用乘积增长率：\nr = 21.2%+65.8%+21.2%×65.8% ≈ 87%+14% = 101%。\n\n验证：21.2%×65.8%≈13.9%，合计约100.9%。'},
{q:'2014年全国棉花播种面积4219.1千公顷，同比减少2.9%；总产量616.1万吨，同比减产2.2%。\n\n问：2014年全国棉花单位面积产量比上年约？\nA.提高5.1%  B.提高0.7%  C.降低5.1%  D.降低0.7%',a:'单产=产量/面积。平均数增长率：\n(-2.2%-(-2.9%))/(1-2.9%) = 0.7%/0.971 ≈ 0.72%。\n\n提高了约0.7%，选B。技巧：分子减分母的增速差只有0.7%，除以接近1的数，结果就在0.7%附近。'},
{q:'2020年H省秋粮生产成本：机耕增速0.3%、机播增速6.4%、机收增速-2%、排灌增速-12%。\n问：增量最高的是？增量最低的是？',a:'机耕增速>0，是唯一正增长，增量最高。\n排灌增速-12%是机收增速-2%的6倍，而现期排灌仅是机收的2.5倍→排灌增量绝对值更大（因为是负的，所以"更低"）。\n\n💡 增量比较：先看增速正负，再看增速与现期的乘积大小关系。只有弱势方增速也低时，才需要修正。'},
],tips:'乘积增长率核心：r≈r₁+r₂（交叉项通常<5%可估算）。平均数增长率核心：分子增速-分母增速，除以接近1的数可近似忽略。'},

{title:'第四课 · 比重类问题', key:'比重计算、两期比重差、比重增速、利润率', formulas:[
  '\\text{比重} = \\frac{\\text{部分}}{\\text{整体}}',
  '\\text{两期比重差} = \\frac{A}{B} \\cdot \\frac{r_a - r_b}{1+r_a} \\quad (\\text{百分点})',
  '\\text{比重增速} = \\frac{r_a - r_b}{1+r_b}',
  '\\text{资料分析利润率} = \\frac{\\text{利润}}{\\text{收入}} \\quad (\\text{收入利润率})',
],concepts:[
  {t:'比重判断',d:'部分增速>整体增速 → 比重上升；部分增速<整体增速 → 比重下降。不动笔，心算决定方向'},
  {t:'两期比重差',d:'现期比重-基期比重。单位是百分点。公式=A/B×(ra-rb)/(1+ra)。通常选项差距大，可估算'},
  {t:'基期比重',d:'现期比重/(1+比重增速)。判断方向：分子增速>分母增速则基期比<现期比'},
  {t:'利润率',d:'资料分析中一般为收入利润率=利润/收入（自带百分号的平均数）。数量运算中才是成本利润率'},
],examples:[
{q:'2021年前三季度，全国6.4万家规模以上文化企业营业收入同比增长21.8%。其中：新闻信息服务22.1%、创意设计服务24.0%、文化传播渠道30.1%、文化娱乐休闲服务35.3%、文化消费终端生产22.0%。\n\n问：占全国规模以上文化企业营业收入比重增加的行业有几个？\nA.3个  B.4个  C.5个  D.6个',a:'部分增速>整体增速21.8%则比重上升。\n新闻22.1%✓ 创意24.0%✓ 传播30.1%✓ 娱乐35.3%✓ 终端22.0%✓\n共5个。选C。\n\n不动笔，纯心算比较大小即可。'},
{q:'（河北2013）2011年图书进口额11666.91万美元，同比增长24.09%；少儿读物进口额629.25万美元，同比增长67.66%。\n\n问：2010年少儿读物进口额占图书进口总额的？\nA.4.0%  B.5.4%  C.8.2%  D.8.6%',a:'现期占比=629.25/11666.91≈5.4%。\n分子增速67.66%>分母增速24.09%→比重增速>0→基期比<现期比5.4%。\n选A（4.0%）。\n\n💡 无需精算基期比，只需判断方向+选项排除。'},
],tips:'比重三问：①方向→ra vs rb ②差值→A/B×(ra-rb) ③基期→现期比/(1+比重增速)。先方向后数值，选项差距大时大胆估。'},

{title:'第五课 · 分式混合', key:'线段法、混合增速、基期差估算、反比关系', formulas:[
  '\\frac{m}{n} = \\frac{C-B}{A-C} \\quad \\text{距离比=分母(基期)反比}',
  '\\text{混合增速在两部之间，靠近基期大的一侧}',
  'A-B+B=A \\Rightarrow \\text{三者构成线段混合关系}',
],concepts:[
  {t:'分式属性',d:'有分子分母的属性——浓度（盐/水）、利润率（利润/成本）、人均收入（收入/人数）、增速（增量/基期）'},
  {t:'线段法',d:'两个部分混合后，整体属性值在两部之间。到两端的距离之比=分母（基期）的反比'},
  {t:'基期差估算',d:'A-B+B=A→A增速在B增速与(B差值)增速之间。可快速判断差值的增速范围，排除明显不对的选项'},
],examples:[
{q:'2015年河北省油料产量79.17万吨，增速31.2%；水果产量126.37万吨，增速2.4%。\n\n问：油料和水果总产量比上年增长？\nA.2.3%  B.11.9%  C.16.9%  D.24.9%',a:'混合增速在2.4%~31.2%之间，排除A、D。\n水果基期≈123（分母大），油料基期≈60→混合增速更靠近水果2.4%。\n(2.4%+31.2%)/2=16.8%。偏向水果，约在10-14%。选B。'},
{q:'（2015上海）2013年1-11月，全国汽车商品进出口总额1458.72亿美元，同比增长4.1%。进口745.63亿美元，增长3.2%；出口713.09亿美元，增长5.2%。\n\n问：2012年1-11月，贸易呈现？\nA.顺差32.5亿  B.顺差44.7亿  C.逆差32.5亿  D.逆差44.7亿',a:'13年进口745.63>出口713.09→逆差32.54亿。A、C为现期迷惑项，排除。\n逆差+出口=进口→三者线段混合。出口/逆差≈20倍→逆差增速远小于0。\n基期逆差>现期32.5→选D（44.7亿）。\n\n💡 线段法精髓：无需精确计算，利用数量级比例关系直接排除。'},
],tips:'线段时间：先定范围（两数之间），再判断偏向哪侧（基期大的一侧）。基期差估算注意：差值往往与另一部分数量级差距大，小心现期比代替基期比的偏差。'},

{title:'第六课 · 容斥问题', key:'二属性容斥、三属性容斥、铺砖思维', formulas:[
  '\\text{同时A且B：}[a\\%+b\\%-100\\%,\\min(a\\%,b\\%)]',
  '\\text{同时A且B且C：}[a\\%+b\\%+c\\%-200\\%,\\min(a\\%,b\\%,c\\%)]',
],concepts:[
  {t:'容斥本质',d:'讨论统计数据中多种属性重叠——"既是A又是B"的比例范围，而非精确值'},
  {t:'最小值原理',d:'尽量让B的人分布在A外部(1-a%)中，剩下必须放在A内部的是a%+b%-100%'},
  {t:'铺砖思维',d:'每个统计对象=一个格子，每种属性=一块砖头。根据题目要求分配砖头到格子中'},
],examples:[
{q:'某调查1105人：2013年Q1，选择"欺诈类"占比68.3%，选择"网站推广类"占比49.3%。\n\n问：同时选择这两类的人数可能是？\nA.315人  B.185人  C.135人  D.95人',a:'同时选择范围：[68.3%+49.3%-100%, 49.3%]=[17.6%,49.3%]。\n1105×17.6%≈194人，1105×49.3%≈545人。\n范围[194,545]，只有A（315）在范围内。\n\n快速技巧：max=49.3%×1105≈545，远超BCD选项→直接选A。'},
],tips:'记口诀：[a+b-100, min(a,b)]。当a+b≤100%时最小值为0。三属性公式类推：[a+b+c-200, min(a,b,c)]。更多的时候用"铺砖"思路现场推导比背公式更靠谱。'},

{title:'第七课 · 分式比较大小', key:'混合型分式比较、避免多余运算', formulas:[
  '\\frac{A}{A+B} \\uparrow \\iff \\frac{B}{A} \\downarrow \\iff \\frac{A}{B} \\uparrow',
  '\\text{全量}=A+B\\text{时，}\\frac{A}{A+B}\\text{与}\\frac{A}{B}\\text{趋势一致}',
],concepts:[
  {t:'核心思想',d:'全量=部分A+部分B时，A/(A+B)的大小关系与A/B的大小关系单调性一致。避免多余的加减运算'},
  {t:'应用场景',d:'民政捐赠/总捐赠、男性/全体、某品牌/总销量——只要涉及"一部分占全体"的比较'},
],examples:[
{q:'2013年民政部门接收社会捐赠款107.6亿元，社会组织接收458.8亿元。\n2014年民政部门接收79.6亿元，社会组织接收524.9亿元。\n\n问：2014年民政部门接收捐赠款占总数的比重，与2013年相比？',a:'民政占比=民政/(民政+社会组织)=1/(1+社会组织/民政)。\n2013年：社会组织/民政=458.8/107.6≈4.26\n2014年：524.9/79.6≈6.59\n→2014年比值更大→民政占比更小→比重下降了。\n\n💡 没有算过一次完整的占比值，纯比较大小关系。'},
],tips:'A/(A+B)大 ⇔ B/A小 ⇔ A/B大。三句话的等价关系，记住一个就能推导其他。核心价值：省去加法和除法，只做比例比较。'},

{title:'第八课 · 年均变化问题', key:'年均增量、年均增速、远期估算、省份差异', formulas:[
  '\\text{年均增量} = \\frac{B_{\\text{终}} - A_{\\text{始}}}{\\text{年份差}}',
  '(1+r_{\\text{年均}})^n = \\frac{B}{A} \\quad \\text{（复合增长）}',
  '\\text{远期值} = B \\times \\frac{B}{A} \\quad \\text{（年均增速不变时）}',
],concepts:[
  {t:'年均增量',d:'从基期到现期平均每年的增量（等差数列思维）。公式=(现期-基期)/年份差。注：不同省份对年份差不一致'},
  {t:'年均增速',d:'复合增长率（等比数列思维），(1+r)^n=现期/基期。注意区分"十一五"(2006-2010)和"十二五"(2011-2015)等时期'},
  {t:'年均增量不变',d:'保持增量不变时，T=(目标值-现期)/增量。增量=速度，现期/未来值=路程'},
  {t:'江苏特色',d:'江苏省考题中年份基期往往前推一个月/一年，需特别关注题干中"基期"的界定方式'},
],examples:[
{q:'（2024青海）2019年全国体育场地数量354.44万个，2022年为422.68万个。\n\n问：2019-2022年全国体育场地数量年均增量约为？',a:'年均增量=(422.68-354.44)/(2022-2019)=68.24/3≈22.75万个。'},
{q:'（2013江苏）"十一五"期间（2006-2010年）江苏税收收入从2005年1107亿元增至2010年3313亿元。若"十二五"期间保持相同年均增速，则2015年税收收入预计为？\nA.5075  B.7902  C.9915  D.12246',a:'十一五增速：3313/1107≈3倍。保持相同增速→十二五再变3倍。\n3313×3=9939≈9915。选C。\n\n💡 技巧：现期/基期=倍数，保持增速→再乘一次倍数。不需要开方算年均增速！'},
{q:'（2016江苏）2015年2-6月水力发电量月均增速与1月（565）到6月（1028）相同，则11月可达？\nA.1390  B.1870  C.2063  D.2239亿千瓦时',a:'1月→6月：1028/565≈1.82倍。保持增速→6月→11月（也隔5个月）：1028×1.82≈1870。选B。'},
],tips:'年均增量=算术平均（减完除n）；年均增速=几何平均（开n次方）。远期估算=现期×倍数。江苏题注意基期前推！'},

{title:'第九课 · 增长贡献率与拉动增长', key:'贡献率、拉动增长率、两者的转换关系', formulas:[
  '\\text{贡献率} = \\frac{\\Delta_{\\text{部分}}}{\\Delta_{\\text{整体}}}',
  '\\text{拉动增长率} = \\frac{\\Delta_{\\text{部分}}}{A_{\\text{整体}}}',
  '\\text{拉动增长率} = \\text{贡献率} \\times r_{\\text{整体}}',
],concepts:[
  {t:'贡献率',d:'部分增量占整体增量的比重——"整体增量中有百分之多少是这个部分带来的"'},
  {t:'拉动增长率',d:'部分增量占整体基期的比重——"这个部分拉动整体增长了多少个百分点"'},
  {t:'关系',d:'两者差一个整体增速的倍数。因为整体增速=整体增量/整体基期，所以拉动增长率=贡献率×整体增速'},
],examples:[
{q:'"十一五"期间，农村居民人均纯收入从2005年3255元增至2010年5919元（+2664元）。工资性收入从2005年1174元增至2010年2431元（+1257元）。\n\n问：工资性收入对人均纯收入的增长贡献率？拉动增长多少个百分点？',a:'贡献率=1257/2664≈47.2%（工资性收入贡献了整体增长的近一半）。\n拉动增长率=1257/3255≈38.6个百分点。\n验证：贡献率×整体增速=47.2%×(2664/3255)=47.2%×81.8%≈38.6%。✓'},
],tips:'贡献率分母是增量，拉动增长率分母是基期。记忆：贡献→增量（都是"增加"的），拉动→基期（往"回"拉的）。'},

{title:'第十课 · 假设代入思想', key:'代入验算、增量验算方向、选项逼近', formulas:[
  '\\text{假设}\\Delta=a \\Rightarrow \\text{基期}=B-a \\Rightarrow \\text{验算}\\Delta\'= \\text{基期}\\times r',
  '\\Delta\' < a \\Rightarrow \\text{实际}\\Delta < a \\quad \\text{（假设偏大）}',
  '\\Delta\' > a \\Rightarrow \\text{实际}\\Delta > a \\quad \\text{（假设偏小）}',
],concepts:[
  {t:'核心思想',d:'猜一个方便算的值→验算与实际差距→判断真实值在假设值的哪一侧。本质是"二分法"的直觉版'},
  {t:'增量验算',d:'假设增量→倒推基期→用基期×增速算验算增量→与实际现期比较→判断假设偏大还是偏小'},
],examples:[
{q:'（2023江西）2021年全国城市供水管道长度105.99万公里，同比增长5.26%。\n\n问：2021年全国城市供水管道长度比2020年增长约？\nA.4.5万公里  B.5.3万公里  C.5.6万公里  D.6万公里',a:'假设增量=5.99（与增速5.26%凑巧），则基期=105.99-5.99=100。\n验算增量=100×5.26%=5.26。\n验算现期=105.26<实际105.99→假设增量偏大。\n实际增量在5.26~5.99之间，靠近5.3。选B。\n\n💡 选择"漂亮的"数字假设（100、整数等），验算一次就知道方向。'},
],tips:'假设代入三步骤：①假设一个方便的值 ②用不变的参数（如增速）验算 ③看偏差方向，判断真实值在哪一侧。适用于选项差距小、不便精算的场景。'},

{title:'第十一课 · 常见"坑位"', key:'表述陷阱、时间主体单位坑、概念辨析', formulas:[],concepts:[
  {t:'增速vs降幅','d':'增速有正负；降速/降幅/跌幅只看绝对值（只有下降才有）。变化幅度/变化量上升下降都看绝对值'},
  {t:'名义vs实际','d':'名义增速包含价格因素；实际增速扣除物价。题干要看清是"名义增长"还是"实际增长"'},
  {t:'百分号vs百分点','d':'增速通常用%，比重变化用百分点。恩格尔系数32.9%"提高0.9个百分点"是增量，非增速0.9%'},
  {t:'增加值≠增量','d':'GDP核算中的"增加值"指一定时期生产活动的增加值，是一个产值概念，不是"增长量"'},
  {t:'时间坑','d':'同比vs环比、1-X月vsX月、年末vs年初。看清楚"从哪年到哪年"'},
  {t:'主体坑','d':'城镇vs城乡、规模以上vs全部、进口vs出口。每个"限定词"都可能是坑'},
],examples:[
{q:'（山东2007）判断以下选项正误：\nA.2007年全省人口自然增长率为5.0%\nB.2007年城镇恩格尔系数提高了0.9%\nC.2007年城镇居民人均可支配收入实际增长17.0%\nD.2007年城镇居民人均工资性收入增长额高于人均消费性支出增长额',a:'材料：自然增长率5.0‰（千分号！）→A把‰当%写，错。\n恩格尔系数提高0.9个百分点（增量非增速）→B把百分点当%，错。\n实际增长12.1%≠名义17.0%→C混淆名义与实际，错。\nD：工资性11814×13.1%≈1548 > 消费9667×14.1%≈1363 → 正确。\n\n💡 这道题把常见坑位几乎全踩了一遍。'},
],tips:'资料分析最大的失分不是算不对，而是"看错"——时间看错、主体看错、单位看错、概念混淆。每做一道题先花5秒确认：时间对吗？主体对吗？单位对吗？概念对吗？'}
    ]
  },{
    name:'数量关系',lessons:[]
  },{
    name:'判断推理',lessons:[
{title:'论证推理① 解题方法概论',key:'薛睿 · 论据→结论结构 · 考点分类体系',formulas:[],concepts:[
  {t:'题目结构',d:'(1)背景/干扰信息 (2)论据 (3)结论引词+结论 (4)提问句。结论通常在最后一句，少数在第一句'},
  {t:'核心原则',d:'理解考点和底层逻辑，而非用阅读理解刷题。相同考点的题只有文字不同，结构和推理相同'},
  {t:'正确分类',d:'按考点分类而非按"削弱/假设/支持"分类。正向说=支持，反向说=削弱，底层考点不变'},
  {t:'解题步骤',d:'①读题干找论据和结论 ②盖住选项思考10-20秒推理结构 ③预判正确选项方向 ④去选项中匹配'},
],examples:[
{q:'论证推理占公考逻辑判断题目的约多少？备考的关键是什么？',a:'约占70%，是备考的重中之重。关键是理解固定的考查思路和解题方法。懂考点→30秒甚至10秒做对；不懂→做3分钟也可能猜错。'},
{q:'（2021四川）甲醛对室内植物的影响与植物抗性强弱有关。问最能反驳的是？',a:'论据：抗性弱的植物叶绿素下降更快。结论：甲醛影响与抗性强弱有关。\n\n这是一道典型的论证推理题。关键在于：先识别论据和结论的结构，再判断考点类型，最后找对应选项模式。不要凭感觉选！'},
],tips:'论证推理＝70%的题量。不要靠感觉刷题，要先理解考点 → 再做题验证 → 形成肌肉记忆。要能做到"不看答案也知道自己做对了"。'},

{title:'论证推理② 二句式推理 + 补全逻辑',key:'论据结论有重复词 · 补全逻辑链',formulas:[
  '\\text{结构1：论据}A \\rightarrow B\\text{，结论}A \\rightarrow C \\Rightarrow \\text{补：}B \\rightarrow C',
  '\\text{结构2：论据}A \\rightarrow C\\text{，结论}B \\rightarrow C \\Rightarrow \\text{补：}B \\rightarrow A',
],concepts:[
  {t:'二句式推理',d:'论据和结论有重复内容（前一半或后一半重复）。正确选项必须包含论据中的关键信息，不能仅针对结论'},
  {t:'一句式推理',d:'结论包含完整推理，论据是实验数据/对比结果/背景信息。只需关注结论的推理'},
  {t:'补全逻辑',d:'两句式推理的典型考点。缺少一个逻辑环节，正确选项把这个环节补上。共28题'},
],examples:[
{q:'（2013山东）科学家发现南方古猿有定型弓形足→人类的祖先320万年前就开始用双脚行走。\n\n问：最能支持上述结论？',a:'论据：弓形足(A)→(B)。结论：弓形足(A)→用双脚行走(C)。\n缺少的环节：B→C，即"定型弓形足→使用双脚行走"。\n\n这是二句式推理+补全逻辑的典型结构。'},
{q:'论据：吃巧克力→心情好。结论：可可→心情好。问补全逻辑？',a:'结构：论据A→B，结论A→C。需要补B→C："巧克力中的可可成分是导致心情好的原因"。'},
],tips:'二句式推理口诀：前一半重复补后一半的逻辑，后一半重复补前一半的逻辑。正确选项=论据关键词+补的逻辑连词。'},

{title:'论证推理③ 由因推果（上）',key:'315题 · 最大考点 · 预言家思维',formulas:[],concepts:[
  {t:'由因推果',d:'论据是因，结论是果。从原因推理未来的结果——"预言家思维"。共315题，是最大的考点'},
  {t:'推理方向',d:'原因→结果。顺向推理，预测可能发生的结果。理论上更确定（理想情况下）'},
  {t:'五大子题型',d:'①建立联系(81题) ②直接引入他因(127题) ③前真后假(39题) ④直接举例子(43题) ⑤直接反驳论据/结论(25题)'},
  {t:'关键区分',d:'其他导致结果成立的他因→不能削弱由因推果！因为原因不互斥。必须引入让结果不成立的他因'},
],examples:[
{q:'（2017国考）人体大脑有"血脑屏障"，能阻止有害物质进入。但研究发现咖啡因等物质能穿过。问最能支持"有些物质能穿过血脑屏障"？',a:'这是由因推果结构。论据（原因）：某些物质有特殊性质。结论（结果）：能穿过血脑屏障。\n\n支持方式：建立联系——论证原因确实能导致结果。'},
{q:'农民小王勤奋除草施肥→今年会有好收成。以下哪项最能削弱？',a:'由因推果结构。削弱：引入让结果不成立的他因：\n✓ 今年有严重旱涝灾害\n✓ 今年发生了严重虫害\n✗ 隔壁老张也勤奋（其他原因能导致好收成≠削弱，因为原因不互斥）'},
],tips:'由因推果削弱核心：引入让结果不成立的他因，而非引入其他也能导致结果成立的原因。记住：原因不互斥，其他能导致同样结果的原因不能削弱。'},

{title:'论证推理④ 由因推果（下）+ 由果推因',key:'前真后假 · 直接举例 · 由果推因29题',formulas:[],concepts:[
  {t:'前真后假',d:'论据为真但结论为假的情况。用反例削弱推理链。共39题'},
  {t:'直接举例子',d:'用具体案例支持或削弱论证。共43题'},
  {t:'直接反驳论据/结论',d:'最直接的削弱方式——攻击论据本身或结论本身。共25题'},
  {t:'由果推因',d:'论据是果，结论是因。从结果反推原因——"刑侦思维"。逆向推理，通常不确定（多因一果）。共29题'},
  {t:'由果推因削弱',d:'引入一个与题干原因无关的、能让结果成立的他因。且这个他因必须真实发生在题干中或实验中'},
],examples:[
{q:'（2008管综联考）H国雨林面积缩小比例明显低于往年。H国政府宣称保护努力取得显著成效。问最能削弱？',a:'论据(果)：雨林缩小比例低于往年。结论(因)：是因为政府保护努力。\n\n这是由果推因结构。削弱：引入其他导致结果成立的原因——\n"去年H国旱季出现大范围持续降雨"（降雨才是真正原因，而非政府努力）。'},
{q:'（2021省联考）科学家在陨石中发现微化石→彗星胚种论。问最能反驳？',a:'论据(果)：陨石中有类似生物的化石。结论(因)：生命来自彗星。\n\n反驳：D项"无法证明该石头是陨石"直接攻击论据，釜底抽薪。\n这是"直接反驳论据"的典型应用。'},
],tips:'由因推果 vs 由果推因的削弱区别，仅在削弱时不同。支持和假设两种结构一样。考试焦点在由因推果(315题)，由果推因(29题)考得少但思维训练价值高。'},

{title:'论证推理⑤ 秒杀思路',key:'第三者建立联系 · 38题 · 直接选答案',formulas:[],concepts:[
  {t:'题干特征',d:'①因为A直接导致B，所以C跟B没关系 ②因为C不会直接影响B，所以B不会因C改变而改变'},
  {t:'正确选项模式',d:'A会直接导致C（通过第三者建立A和C的联系）。即：A→C→B，所以C确实跟B有关系'},
  {t:'秒杀本质',d:'看到题干说"A跟C无关"，直接去找"A→C"的选项。不需要纠结其他选项'},
],examples:[
{q:'（2016国考）研究者认为情绪问题→哮喘。反对者认为迷走神经兴奋性提高才是原因，与情绪无关。问最能削弱反对者？',a:'秒杀：反对者说"情绪跟迷走神经没关系"。正确选项→情绪会改变迷走神经：\n"消极情绪会提高患者迷走神经的兴奋性并降低交感神经的反应性"。\n\n情绪→迷走神经→哮喘，三者建立了联系。'},
{q:'（2019国考）研究者认为营养不均衡→脱发。反对者认为毛囊受损才是原因。问最能削弱反对者？',a:'相同套路。反对者说营养不均衡跟毛囊受损没关系。正确选项→营养不均衡会导致毛囊受损。\n\n这就是"通过第三者建立联系"——A(营养)→C(毛囊)→B(脱发)。'},
],tips:'秒杀思路=看到"某某跟某某没关系"直接去选项里找"某某→某某"的选项。30秒出答案。'},

{title:'论证推理⑥ 解释题型',key:'30题 · 解释现象/矛盾 · 可转化为削弱/支持',formulas:[],concepts:[
  {t:'解释现象',d:'论据和结论一致。指出蕴含的道理→类似建立联系或引入他因的支持'},
  {t:'解释矛盾',d:'论据和结论不一致（按理说应该A，实际却是相反）。引入一个让实际结果合理的他因'},
  {t:'典型矛盾',d:'①部分增加，总体反而减少 ②收益增加，总体反而变差 ③有利因素出现，总体反而变差'},
  {t:'转换思维',d:'问解释的题都可以改为问削弱/支持，同理削弱/支持的题也可以问解释'},
],examples:[
{q:'（2019国考）幼儿园向晚接孩子的家长收费后，晚接的家长反而增加了。问最能解释？',a:'按理说：收费→减少晚接。实际：收费→增加晚接。矛盾！\n\n解释：收费后家长觉得"反正交了钱，晚接也没事"，心态从"不好意思"变成"已经付了费"。\n\n这是典型的"按理说应该A，实际却是相反"的矛盾解释。'},
],tips:'解释矛盾=引入一个让矛盾合理化的他因。思路与削弱/支持题通用，只是问法不同。'},

{title:'论证推理⑦ 选非题型',key:'69题 · 排除法 · 注意无关选项陷阱',formulas:[],concepts:[
  {t:'选非题特征',d:'题干问"除了哪项外都能削弱/支持"或"以下哪项不能解释"。选那个最不能支持/削弱/解释的'},
  {t:'解题方法',d:'排除法：找到能削弱/支持的选项先排除，剩下的就是答案。注意由因推果结构中"其他导致结论成立的他因"往往是无关选项'},
  {t:'常见陷阱',d:'选非题中，选项看似相关实则无关的情况很多。要严格按考点判断，不要脑补'},
],examples:[
{q:'选非题的解题顺序？',a:'①先看提问确认是选非题 ②逐一判断每个选项对论证的作用 ③排除有作用的选项 ④剩下的就是答案。\n\n关键：不要先入为主觉得哪个选项"看起来不对"，要严格按考点验证每个选项。'},
],tips:'选非题=选出"与众不同"的那个。本质还是考对考点的理解，只是反过来选。'},

{title:'论证推理⑧ 引入前提',key:'43题 · 必要条件 · 取反代入验证法',formulas:[
  '\\text{取反代入：取反选项} \\Rightarrow \\text{代入题干} \\Rightarrow \\text{结论是否不成立？}',
],concepts:[
  {t:'题型特征',d:'问法："要得到上述结论，需要补充的前提假设是"。正确选项是结论成立的必要条件'},
  {t:'取反代入法',d:'把选项取反，代入题干验证结论是否会明显不成立。取反后能让结论不成立的→必要条件→正确答案（普适性方法）'},
  {t:'政策建议类',d:'①建议做某事的前提→这事还没被做过 ②建议某人做→某人有能力 ③措施有效→大家会按措施执行'},
],examples:[
{q:'（2024陕西）专家认为土楼是应客先民聚族而居、集体防卫的需要而产生的。要得到上述结论，需要补充的前提是？',a:'取反代入验证：\n结论→土楼是为了集体防卫。\n前提→潮汕历史上确实存在需要防卫的威胁（山贼、海盗）。\nB项"潮汕历史上有过漫长的山海动荡"取反→没有动荡威胁→防卫需求不成立→结论不成立。故选B。'},
{q:'（政策类范例）"只要对每个初生儿进行亲子鉴定，贩卖人口的事儿就解决了。"前提？',a:'取反验证：\n①没被做过？→否，还没实施过 ✓\n②有能力做？→能做亲子鉴定 ✓\n③大家会执行？→取反：有人不执行→贩卖人口依然存在→结论不成立 ✓\n\n最关键前提：大家都会按这个措施执行。'},
],tips:'取反代入是引入前提题的万能解法。不靠感觉，不靠记忆，就靠"取反→看结论会不会崩"。'},

{title:'论证推理⑨ 结论推出',key:'55题 · 不脑补 · 严格收敛推理',formulas:[],concepts:[
  {t:'核心原则',d:'严格依据题干、不脑补任何信息。不要用个人专业知识或生活常识代入解题'},
  {t:'排除技巧',d:'①主体词汇与题干不同的→排除 ②题干未提及的比较→排除 ③程度副词("过于""急剧""最")→排除 ④绝对词("所有""一定""必然")→排除'},
  {t:'正确方法',d:'捕捉核心概念→进行简单推理→排除引入无关概念的干扰选项→选择最严格的答案'},
],examples:[
{q:'（2022广东）法律规定：用人单位经协商、取得工会和劳动者同意后可延长工作时间，一般每日不超过1小时。某企业周五晚延长工作时间但不违法。可推出？',a:'不违法→满足法律条件。\nA"一定不超过1小时"→绝对词，且法律允许特殊情况下超1小时，排除。\nB"所有员工都同意"→绝对词，排除。\nC"工会同意延长"→法律必要条件之一，且没有绝对词。✓\nD"不受限制的特殊行业"→题干未提及，排除。\n\n选C。结论推出=排除一切不严谨的表述。'},
],tips:'结论推出="最安全的推理"。口诀：不说没有的、不比没有的、不绝对化、不夸张化。严格等于材料的范围。'},

{title:'论证推理⑩ 评价题型',key:'59题(+广东32题) · 评价结构/对话/论证',formulas:[],concepts:[
  {t:'评价结构',d:'题干给出带有逻辑连词的文字，要求找出能评价/检验论证的选项。类似"如何检验这个论证对不对"'},
  {t:'两人对话',d:'甲乙两人各执一词，问如何评价/谁说得对。需要分别分析两人的论证结构'},
  {t:'评价论证',d:'分析论证的推理过程，找出论证的漏洞或需要验证的关键点'},
],examples:[
{q:'（2022广东）胆固醇水平的降低将伴随甘油三酯水平的降低。问最能评价上述论证的是？',a:'评价题核心：找到"验证论证是否成立的关键实验/数据"。\n需要看：胆固醇降低的同时，甘油三酯是否真的降低了？两者是否有因果关系还是伴随现象？\n\n评价题的关键是找到论证的"可检验点"。'},
],tips:'评价题=问"怎么验证这个论证的真假"。本质上是在找论证成立需要满足的"检验条件"。'},
,
{title:'形式逻辑① 基础符号与逻辑连词',key:'薛睿 · 4种符号 · 德摩根律 · 除非否则',formulas:[
  '\text{非}(\lnot A) \quad \text{or}(A \lor B) \quad \text{and}(A \land B) \quad \to(A \to B)',
  '\lnot(A \lor B) = \lnot A \land \lnot B \quad \lnot(A \land B) = \lnot A \lor \lnot B',
  '\text{除非}A\text{，否则}B = \lnot A \to B',
  'A \lor B \equiv \lnot A \to B \equiv \lnot B \to A',
],concepts:[
  {t:'形式逻辑',d:'只看形式和结构、不看内容的逻辑。必须只关注逻辑结构不被文字内容干扰'},
  {t:'四种基础符号',d:'非(¬)=并非/不/没有；or(∨)=或者/至少有一个；and(∧)=并且/同时/即使也；→=如果那么/只要就/所有都是'},
  {t:'德摩根定律',d:'非(A or B)=非A and 非B（否定or得到and）；非(A and B)=非A or 非B（否定and得到or）'},
  {t:'常见逻辑连词',d:'如果A那么B=A→B；只有B才A=A→B（B是必须的箭头指向B）；所有A都是B=A→B；A是B的基础/必要条件→B是A的必要条件即A→B'},
  {t:'除非否则',d:'除非A否则B = ¬A→B = A or B。注意："除非不A否则B"=A→B；"B除非A"=¬A→B'},
],examples:[
  {q:'小红想买衣服，父亲同意或母亲同意都会买，但小红没能说服家人买。说明？',a:'题干：父∨母→买。没买→¬(父∨母)=¬父∧¬母。"父母都不同意"。选C。对or取非：¬(A or B)=¬A and ¬B。'},
  {q:'除非你去，否则会出差错。用逻辑符号表述？',a:'除非A否则B = ¬A→B。¬(你去)→出差错 = 你不去→出差错。也等价于：你去 or 出差错。'},
  {q:'小张说"除非A否则B"，小李说"¬B→A"，小王说"A or B"。谁对？',a:'三个人都对！除非A否则B = ¬A→B（小张）；逆否：¬B→A（小李）；¬A→B = A or B（小王）。三者等价。'},
],tips:'形式逻辑=数学思维解语文题。关键三步：①识别逻辑连词→②转化为符号→③用公式推理。不要被文字内容干扰！'},

{title:'形式逻辑② 等价变换与逻辑真/事实真',key:'薛睿 · 逆否命题 · or→→转换 · 逻辑串联 · 顺肯逆否',formulas:[
  'A \to B \equiv \lnot B \to \lnot A \quad (\text{逆否命题})',
  'A \lor B \equiv \lnot A \to B \equiv \lnot B \to A',
  'A \to B, B \to C \Rightarrow A \to C \quad (\text{逻辑串联})',
],concepts:[
  {t:'逆否命题',d:'把箭头方向取反，两边分别加非。A→B的逆否是¬B→¬A。原命题为真，逆否命题一定同时为真'},
  {t:'or转→',d:'否定or的一边可以推出另一边。A or B为真→¬A→B为真。注意：肯定or的一边推不出另一边'},
  {t:'逻辑串联',d:'A→B成立+B→C成立→A→C成立。多个逻辑箭头可以连成链条，事实真沿链条传递'},
  {t:'逻辑真≠事实真',d:'A→B为真只说明逻辑关系成立，不等于A真也不等于B真。只有代入事实真才能推出确定结论。这是形式逻辑最核心的思维模型'},
  {t:'顺肯逆否',d:'肯定前件→推出后件为真（顺肯）；否定后件→推出前件为假（逆否）。前件为假或后件为真→推不出任何信息'},
],examples:[
  {q:'A→B成立，哪种情况能推出确定结论？',a:'①A为真→能推出B为真（顺肯）✓
②B为假→能推出A为假（逆否）✓
③A为假→推不出B的真假 ✗
④B为真→推不出A的真假 ✗
口诀：前真推后真，后假推前假。前假后真啥也推不出。'},
  {q:'A or B成立，¬A为真，能推出什么？',a:'A or B成立 = ¬A→B成立。代入¬A为真→推出B为真。否定or的一边可推出另一边；肯定一边推不出另一边。'},
  {q:'已知：如果赌博会导致倾家荡产。问：不赌博就不会倾家荡产？',a:'错！这是典型的"逆推"错误。赌博→倾家荡产，前件为假（不赌博）推不出任何结论。日常生活中我们脑补了"赌博是唯一原因"，但在形式逻辑题目中绝对不能这样脑补！'},
],tips:'核心区分：逻辑真（A→B成立）≠事实真（A成立）。它们是两种完全不同的条件。'},

{title:'形式逻辑③ 代入事实真推理',key:'薛睿 · 顺肯逆否实战 · 补条件 · 逻辑不可逆',formulas:[
  'A \to B, A \Rightarrow B \quad A \to B, \lnot B \Rightarrow \lnot A',
  'A \to B \to C, \text{ 代入}A \Rightarrow B,C \quad \text{ 代入}\lnot C \Rightarrow \lnot A,\lnot B',
  'A \to B \lor C, A \land \lnot B \Rightarrow C',
],concepts:[
  {t:'题型特征',d:'题干给逻辑箭头+事实真条件，选项问事实真。解题方法：①连逻辑链 ②顺肯逆否代入事实真'},
  {t:'两个事实真代入',d:'A→B or C，加上A and ¬B→推出C。先把第一个事实代入逻辑拆开or，再把第二个事实代入得到确定结论'},
  {t:'补条件题型',d:'问法："需要补上什么条件才能推出结论X"。从结论反向推理，找到缺失的逻辑环节使推理链完整'},
  {t:'逻辑不可逆推',d:'A→B成立，用B为真推不出A的真假。A or B→C成立，用C为真推不出A、B的真假。逻辑箭头绝对不能反向使用'},
],examples:[
  {q:'（2020国考）小张夏天如果去新疆→游吐鲁番和喀纳斯，否则不去；只有与小李同游才游吐鲁番或天池；与小李同游→做约定；做约定→小李有时间。小李没时间。推出？',a:'逻辑链：去新疆→游吐∧喀；游吐∨天→同游→约定→李有时间。代入：李没时间→没约定→没同游→没游吐且没游天。没游吐→（逆否）没去新疆。选A。'},
  {q:'（2021陕西）①吴教语文→张不教生物 ②孙∨吴教语文 ③张不教生物→苏不教物理 ④吴不教化学∨苏教物理。补充什么可推出孙教语文？',a:'要推出孙教语文，由②孙∨吴→需要¬吴。由①逆否：张教生物→吴不教语文。由③逆否：苏教物理→张教生物。由④：吴教化学→苏教物理→张教生物→¬吴。补"吴教化学"→即可。选C。'},
],tips:'代入推理=连链条+顺箭头传结果+逆箭头反推。关键：箭头只能顺着走，不能倒着走。前件假/后件真=推不出任何确定信息。'},

{title:'形式逻辑④ 判断逻辑真假',key:'薛睿 · 代入验证法 · 直接对比法 · 逻辑等价判断',formulas:[
  '\text{代入验证：把选项前件代入题干逻辑} \Rightarrow \text{检查能否推出选项后件}',
  'A \to B \equiv \lnot A \lor B \equiv \lnot B \to \lnot A',
],concepts:[
  {t:'题型特征',d:'题干给逻辑条件（逻辑真），选项也是逻辑命题（含逻辑连词）。问哪个选项一定为真/与题干意思相同'},
  {t:'代入验证法',d:'把选项逻辑的前件代入题干条件，看能否推出选项的后件。能→选项成立；不能→排除'},
  {t:'快速排除',d:'选项前件让题干前件为假→推不出→排除；选项前件让题干后件为真→推不出→排除'},
  {t:'直接对比法',d:'题干逻辑简单（1-2句）→直接找逆否命题或在逻辑链条上找等价表达，就是正确选项'},
],examples:[
  {q:'（2020省联考）坚持锻炼→阿尔茨海默发病风险降低。由此可以推出？',a:'题干：锻炼→风险降低。逆否：风险没降低→没坚持锻炼。B选项=逆否✓。A不锻炼→风险提高（前假推不出）。C风险降低→坚持锻炼（后真推不出）。选B。'},
  {q:'（2022北京）没有真正理解→即使投入精力也不可能取得稳定好成绩。除了哪项外都表达相同意思？',a:'题干：¬理解→¬稳定。等价：稳定→理解。A只有理解才能取得→取得→理解✓。B除非理解否则不能→¬理解→¬取得✓。C只要理解就能取得→理解→取得✗（箭头反了！）。D取得→理解✓。选C。'},
],tips:'判断逻辑真假=把选项当"待验证的命题"。代入法万能：把选项前件扔进题干逻辑链，能推出后件就对，推不出就排除。'},

{title:'形式逻辑⑤ 推矛盾与两难推理',key:'薛睿 · 归谬法 · 隐藏事实真 · 两难推理 · 入选名额',formulas:[
  'A \to B, A \to \lnot B \Rightarrow \lnot A \quad (\text{两难推理，前件必假})',
  '\lnot B \to \lnot A, B \to \lnot A \Rightarrow \lnot A \quad (\text{殊途同归})',
],concepts:[
  {t:'推矛盾',d:'通过"归谬法"找到隐藏的事实真。如果A为真会导致与题干条件矛盾→说明A不能为真（¬A为真）'},
  {t:'题干特征',d:'只给逻辑条件（逻辑真），选项问事实真。需通过推矛盾自己找到隐藏的事实真'},
  {t:'两难推理',d:'A→B且A→¬B同时成立→A不能为真（¬A为真）。两个箭头指向相反方向→说明前件必然为假'},
  {t:'入选名额',d:'有限名额+逻辑条件→推矛盾确定人选。核心是把名额限制当作约束条件，与逻辑条件配合使用'},
],examples:[
  {q:'小张说：如果小张被评为优秀→被浩海公司聘用。小李说：如果小张被评为优秀→不会被聘用。两人都是真话，推出？',a:'优秀→聘用，优秀→¬聘用。如果优秀为真→聘用且¬聘用→矛盾！所以优秀必为假→小张没有被评为优秀。选B。最经典的两难推理：A→B且A→¬B→¬A。'},
  {q:'（2018浙江）¬学电吉他→¬当主唱；想玩乐器→学电吉他；¬玩乐器→当主唱。推出阿健将？',a:'逻辑链：¬学→¬主唱；玩→学；¬玩→主唱。¬玩→主唱→学；玩→学。无论玩不玩都→学。推出：一定会学电吉他。选B。'},
  {q:'（2017上海）从张王李赵陈5人中选3人：①张∨王至多1人 ②李∨赵至少1人 ③¬张→¬赵 ④李→王。推出？',a:'选3人即淘汰2人。由③逆否：赵→张。由④逆否：¬王→¬李。假设¬张：由③¬赵，淘汰张赵→选王李陈。李+④→王。成立。假设张：由①¬王。由④¬李。淘汰王李→选张赵陈。成立。两种情况陈都被选。选D。'},
],tips:'推矛盾的步骤：假设某命题为真→代入逻辑→看是否矛盾→若矛盾则假设不成立→得到隐藏事实真。'},

{title:'形式逻辑⑥ 代入验证找矛盾（前真后假）',key:'薛睿 · 逻辑为假 · 前真and后假 · 一定为假/可能为真',formulas:[
  'A \to B \text{ 为假} \Leftrightarrow A \land \lnot B \quad (\text{前真 and 后假})',
  'A \lor B \text{ 为假} \Leftrightarrow \lnot A \land \lnot B',
  'A \land B \text{ 为假} \Leftrightarrow \lnot A \lor \lnot B',
],concepts:[
  {t:'逻辑为假的条件',d:'A→B为假，仅当前真且后假（A and ¬B）时成立。记住：一个逻辑为假=前真+后假同时成立'},
  {t:'问一定为假',d:'寻找同时满足题干逻辑前件为真和后件为假的选项→该选项一定为假/不可能为真'},
  {t:'问可能为真',d:'排除3个前真后假（与题干矛盾）的选项，剩下1个就是可能为真的选项（与题干不矛盾）'},
],examples:[
  {q:'小张说"如果我中500万，我就送你房子"。小李说这是假话。小李的意思？',a:'逻辑为假=前真and后假。"中500万→送房子"为假 = 中了500万但没送房子。选C。'},
  {q:'（2021四川）"留得五湖明月在，不愁无处下金钩。"以下哪项不可能？',a:'题干：留得明月→不愁下钩（A→B）。不可能=一定为假=前真后假。A and ¬B = 留得明月但无处下钩。B选项就是这个意思，选B。'},
  {q:'（2025上海）所有经济学专业都参加期末考。有些金融学也修微观。所有统计学都没修微观。一定为假？',a:'D"统计学专业学生修了微观经济学"→与"所有统计学都没修微观"矛盾，一定为假。选D。'},
],tips:'核心记忆：逻辑为假 → 前真and后假。问"一定为假/不可能"=找前真后假。问"可能为真"=排除前真后假。'},

{title:'形式逻辑⑦ 真话假话与AEIO',key:'薛睿 · 矛盾关系 · 同真关系 · 不能同假 · AEIO对当关系',formulas:[
  '\text{矛盾：}A \leftrightarrow \lnot A \quad (A \lor B) \leftrightarrow (\lnot A \land \lnot B) \quad (A \to B) \leftrightarrow (A \land \lnot B)',
  '\text{AE上反对(至少一假) · IO下反对(至少一真)}',
  '\text{AO、IE矛盾：必然一真一假}',
],concepts:[
  {t:'矛盾关系',d:'两句话矛盾→必一真一假。找到矛盾→剩下的话的真假就确定了。常见矛盾：A与¬A；A or B与¬A∧¬B；A→B与A∧¬B'},
  {t:'同真关系',d:'若①为真则②必为真→①不能为真（否则超过真话名额）。如A为真则A or B必为真；¬A为真则A→B必为真'},
  {t:'不能同假',d:'两句话不能同时为假→必占1句真话名额→其余话均为假。如A→B与¬B不能同假（①假→A∧¬B→②真）'},
  {t:'AEIO对当',d:'A(所有S是P)、E(所有S不是P)、I(有的S是P)、O(有的S不是P)。AE上反对(至少一假)；IO下反对(至少一真)；AO矛盾、IE矛盾(一真一假)'},
],examples:[
  {q:'（2023浙江）①小张学魏碑→小李学汉隶 ②小张没学秦篆且没学魏碑 ③小张学秦篆∨学魏碑。1真2假，推出？',a:'②和③是矛盾关系→必一真一假。总共1真2假→①必为假。①为假=前真后假=小张学魏碑∧小李没学汉隶。选C。'},
  {q:'（2022国考）①小陈小李都获奖 ②小陈小李至多1人获奖 ③陈获奖李未获奖 ④陈未获奖李获奖 ⑤陈获奖→刘获奖。1人预测正确，推出？',a:'①和②矛盾→一真一假。只有1人正确→③④⑤均为假。⑤为假→小陈获奖∧小刘未获奖。③为假→¬(陈∧¬李)=¬陈∨李。∵陈获奖∴李获奖。选D。'},
  {q:'AEIO练习：①所有游客都买了瓷器 ②所有游客都没买瓷器。两句的关系？',a:'AE上反对关系：不能同真，可以同假，至少有一假。IO下反对：①有的游客买了 ②有的游客没买。不能同假，可以同真，至少有一真。'},
],tips:'真话假话3种套路：①找矛盾→确定真话分配 ②同真→确定某句不能为真 ③不能同假→确定某句必为真。顺序：先找矛盾→再找同真→最后找不能同假。'},

{title:'形式逻辑⑧ 一一对应与文氏图',key:'薛睿 · 元素匹配 · 推理型条件 · 直言命题 · 所有/有的推理',formulas:[
  '\text{所有}A\text{是}B \Rightarrow A \to B \quad \text{有的}A\text{是}B \Leftrightarrow \text{有的}B\text{是}A',
  '\text{所有}A\text{是}B + \text{有的}C\text{是}A \Rightarrow \text{有的}C\text{是}B',
  '\text{所有}A\text{是}B + \text{所有}B\text{是}C \Rightarrow \text{所有}A\text{是}C',
],concepts:[
  {t:'一一对应',d:'N个元素分配N个位置/角色。三原则：①一山不容二虎(位置被占则其他元素不能再占) ②一人不饰两角(元素已分配不能再分配到其他位置) ③最后位置必给最后一人'},
  {t:'推理型条件',d:'一一对应中条件用逻辑箭头表达→使用代入事实真和推矛盾的方法。关键是把位置信息当作事实真代入逻辑链'},
  {t:'直言命题条件',d:'条件用"甲不是X""乙是Y"等直接陈述。两个特征在同一句→代表不是同一个人。只剩2种可能时→分情况讨论'},
  {t:'文氏图(所有/有的)',d:'所有A是B=A→B。"有的A是B"为真→"有的B是A"也为真。所有A是B+有的C是A→有的C是B'},
  {t:'思维误区',d:'①有些A不是B不能推出有些B不是A（包含3种可能）②有些A是B不能推出有些A不是B（"有些"可能包含全集）③所有A是B为真→有的A是B为真'},
],examples:[
  {q:'（2017国考）张王李赵4人：行政/销售/研发/安保。①张不做行政和安保 ②王不做行政和研发 ③张没做研发→赵没做行政 ④李不做行政和安保 ⑤赵不做研发和安保。推出？',a:'从条件①②④⑤：行政：不是张/王/李→赵做行政。安保：不是张/李/赵→王做安保。由③逆否：赵做行政→张做研发。剩下：李做销售。选C。'},
  {q:'（2018国考）30岁以下年轻员工有一部分参加外语培训班。部门经理都同意拓展训练。参加外语培训班的都反对拓展训练。推出？',a:'逻辑：①有的30-→培训班 ②经理→同意拓展 ③培训班→反对拓展。由③②串联：培训班→反对拓展→¬经理。由①+培训班→¬经理→有的30-→¬经理。即：有些30岁以下年轻员工不是部门经理。选D。'},
  {q:'"有些A不是B"为什么不能推出"有些B不是A"？',a:'有些A不是B包含3种情况：①A中有一部分不是B，B中有一部分是A ②A全部不是B（A和B不重叠）③A部分不是B，B全在A中。因为不能确定是哪种，所以不能必然推出"有些B不是A"。这是文氏图题最大的思维误区！'},
],tips:'一一对应=画表格填"√"和"×"，用排除法逐步确定每个元素的位置。文氏图=文字转逻辑箭头，串联推理找"有的"关系。核心公式：所有A→B+有的C→A=有的C→B。'},

]

]

  },{
    name:'言语理解',lessons:[]
  },{
    name:'常识判断',lessons:[]
  }]
},{
  name:'申论',icon:'📝',subjects:[
    {name:'归纳概括',lessons:[]},{name:'综合分析',lessons:[]},
    {name:'对策建议',lessons:[]},{name:'大作文',lessons:[]}
  ]
}];

// ==================== STATE ====================
let curMod=0,curSub=0,openLessons={},showAns={};

// ==================== RENDER ====================
const $m=id=>document.getElementById(id);

function rModTabs(){
  $m('modTabs').innerHTML=D.map((m,i)=>`<span class="mod-tab${i===curMod?' active':''}" onclick="selMod(${i})">${m.icon||''} ${m.name}</span>`).join('');
}
function selMod(i){curMod=i;curSub=0;rModTabs();rSubTabs();rContent();}

function rSubTabs(){
  const s=D[curMod].subjects;
  if(s.length<=1){$m('subTabs').innerHTML='';return}
  $m('subTabs').innerHTML=s.map((x,i)=>`<span class="sub-tab${i===curSub?' active':''}" onclick="selSub(${i})">${x.name}</span>`).join('');
}
function selSub(i){curSub=i;rSubTabs();rContent()}

function toggleSearch(){
  const b=$m('searchBox');b.classList.toggle('show');
  if(b.classList.contains('show')){setTimeout(()=>$m('searchInput').focus(),100)}
  else{$m('searchInput').value='';doSearch()}
}

function doSearch(){
  const q=$m('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    if(!q){c.style.display='';return}
    const txt=c.textContent.toLowerCase();
    c.style.display=txt.includes(q)?'':'none';
  });
  // highlight
  document.querySelectorAll('mark').forEach(m=>{const p=m.parentNode;p.replaceChild(document.createTextNode(m.textContent),m)});
  if(q) document.querySelectorAll('.card').forEach(c=>{
    if(c.style.display==='none')return;
    const walk=document.createTreeWalker(c,NodeFilter.SHOW_TEXT);
    const nodes=[];let n;
    while(n=walk.nextNode())nodes.push(n);
    nodes.forEach(n=>{
      const i=n.textContent.toLowerCase().indexOf(q);
      if(i>=0){
        const span=document.createElement('span');span.innerHTML=n.textContent.substring(0,i)+
        '<mark>'+n.textContent.substring(i,i+q.length)+'</mark>'+n.textContent.substring(i+q.length);
        n.parentNode.replaceChild(span,n);
      }
    });
  });
}

function rContent(){
  const lessons=D[curMod].subjects[curSub].lessons;
  if(!lessons.length){
    $m('content').innerHTML='<div class="empty"><div class="icon">📝</div><p>内容整理中，敬请期待</p></div>';
    $m('progress').innerHTML='';return;
  }
  const done=Object.values(openLessons).filter(Boolean).length;
  $m('progress').innerHTML=`已学习 <b>${done}</b> / ${lessons.length} 课`;

  $m('content').innerHTML=lessons.map((l,i)=>{
    const open=openLessons[i]||false;
    return`<div class="card" data-lesson="${i}">
<div class="card-hd${open?' open':''}" onclick="togLesson(${i},this)">
  <span class="badge">${i+1}</span>
  <span class="info"><span class="title">${l.title}</span><span class="subtitle">${l.key||''}</span></span>
  <span class="arrow">▼</span>
</div>
<div class="card-bd${open?' open':''}">
${l.concepts?`<div class="sec"><div class="sec-tt">📌 核心概念</div>
<table class="tbl">${l.concepts.map(c=>`<tr><td>${c.t}</td><td>${c.d}</td></tr>`).join('')}</table></div>`:''}
${l.formulas?`<div class="sec"><div class="sec-tt">🔢 核心公式</div>
<ul class="fml-list">${l.formulas.map(f=>`<li class="fml-item" data-katex="${esc(f)}"></li>`).join('')}</ul></div>`:''}
${l.examples?`<div class="sec"><div class="sec-tt">📝 经典例题</div>
${l.examples.map((ex,ei)=>{const aid=`a${i}_${ei}`;return`<div class="ex">
<div class="ex-q">${ex.q.replace(/\n/g,'<br>')}</div>
<div class="ex-a${showAns[aid]?' show':''}" id="${aid}">${ex.a.replace(/\n/g,'<br>')}</div>
<button class="ex-btn" onclick="togAns('${aid}',this)">👆 ${showAns[aid]?'隐藏答案':'点击查看答案'}</button>
</div>`}).join('')}</div>`:''}
${l.tips?`<div class="tip">💡 ${l.tips}</div>`:''}
</div></div>`}).join('');
  // render katex
  requestAnimationFrame(()=>{
    document.querySelectorAll('[data-katex]').forEach(el=>{try{katex.render(el.dataset.katex,el,{throwOnError:false,displayMode:true})}catch(e){el.textContent=el.dataset.katex}});
  });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function togLesson(i,hd){
  openLessons[i]=!openLessons[i];hd.classList.toggle('open');
  hd.nextElementSibling.classList.toggle('open');
  const done=Object.values(openLessons).filter(Boolean).length;
  const total=D[curMod].subjects[curSub].lessons.length;
  $m('progress').innerHTML=`已学习 <b>${done}</b> / ${total} 课`;
}
function togAns(id,btn){
  showAns[id]=!showAns[id];
  const el=$m(id);el.classList.toggle('show');
  btn.textContent=showAns[id]?'👆 隐藏答案':'👆 点击查看答案';
}

// init
rModTabs();rSubTabs();rContent();
</script>
